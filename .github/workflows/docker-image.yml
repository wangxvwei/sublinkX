name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/sublinkx
  GHCR_HELPER_IMAGE: ghcr.io/${{ github.repository_owner }}/sublinkx-update-helper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=sublinkX
            org.opencontainers.image.description=sublinkX subscription manager with Clash Verge/Mihomo xhttp support

      - name: Compute app version
        id: app_version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          elif [ -f VERSION ]; then
            version="$(tr -d '[:space:]' < VERSION)"
          else
            version="2.2.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push update helper
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.update-helper
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.GHCR_HELPER_IMAGE }}:27-cli
            ${{ env.GHCR_HELPER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=sublinkX update helper
            org.opencontainers.image.description=Docker CLI helper image for sublinkX one-click updates
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
